name: 🚀 CI/CD Pipeline – LifeBridge AI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Job 1: Install & Lint
  # ─────────────────────────────────────────────────────────────────────────────
  install-and-lint:
    name: 📦 Install & Lint
    runs-on: ubuntu-latest

    steps:
      - name: ⬇️ Checkout repository
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: 📥 Install dependencies
        run: npm ci

      - name: 🔍 TypeScript type check
        run: npx tsc --noEmit

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 2: Build
  # ─────────────────────────────────────────────────────────────────────────────
  build:
    name: 🏗️ Build Production Bundle
    runs-on: ubuntu-latest
    needs: install-and-lint

    steps:
      - name: ⬇️ Checkout repository
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: 📥 Install dependencies
        run: npm ci

      - name: 🔨 Build with Vite
        run: npm run build

      - name: 📤 Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-bundle
          path: dist/
          retention-days: 7

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 3: Deploy to GitHub Pages (only on push to main)
  # ─────────────────────────────────────────────────────────────────────────────
  deploy:
    name: 🌐 Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: ⬇️ Checkout repository
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: 📥 Install dependencies
        run: npm ci

      - name: 🔨 Build for GitHub Pages
        run: npm run build
        env:
          NODE_ENV: production

      - name: 📄 Setup Pages
        uses: actions/configure-pages@v5

      - name: 📤 Upload to Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/

      - name: 🚀 Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
